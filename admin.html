<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHTech Admin Center V3</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:#eef2f7;
  color:#1f2937;
}
.login-card{
  max-width:420px;
  margin:90px auto;
  background:#fff;
  padding:32px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(15,23,42,.15);
}
.login-card h1{margin-top:0;color:#0f172a}
input,textarea{
  width:100%;
  padding:12px 14px;
  border:1px solid #d1d5db;
  border-radius:10px;
  margin:8px 0 14px;
  font-size:15px;
}
button{
  border:0;
  border-radius:10px;
  padding:11px 16px;
  cursor:pointer;
  font-weight:700;
}
.primary{background:#2563eb;color:#fff}
.ghost{background:#e5e7eb;color:#111827}
.layout{display:flex;min-height:100vh}
.sidebar{
  width:240px;
  background:linear-gradient(180deg,#0f172a,#1e293b);
  color:#fff;
  padding:24px 16px;
}
.brand{
  font-size:22px;
  font-weight:800;
  margin-bottom:28px;
}
.nav button{
  width:100%;
  display:block;
  margin:7px 0;
  text-align:left;
  background:rgba(255,255,255,.08);
  color:#e5e7eb;
}
.nav button:hover{background:rgba(255,255,255,.18)}
.main{flex:1;padding:28px}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}
.user{
  background:#fff;
  padding:10px 14px;
  border-radius:999px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:22px;
}
.stat,.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 28px rgba(15,23,42,.08);
}
.stat h3{margin:0 0 8px;color:#64748b;font-size:15px}
.stat b{font-size:28px;color:#0f172a}
.card h2{margin-top:0}
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.full{grid-column:1/-1}
#resultBox{
  background:#0f172a;
  color:#d1fae5;
  border-radius:12px;
  padding:14px;
  white-space:pre-wrap;
}
@media(max-width:800px){
  .layout{flex-direction:column}
  .sidebar{width:100%}
  .grid,.form-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="loginBox" class="login-card">
  <h1>CHTech Admin</h1>
  <p>誠創科技管理中心 V3</p>
  <input id="email" type="email" placeholder="Admin Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn" class="primary" style="width:100%">Login</button>
</div>

<div id="panelBox" class="layout" style="display:none;">

  <aside class="sidebar">
    <div class="brand">誠創科技</div>
    <div class="nav">
      <button data-tab="dashboard">📊 Dashboard</button>
      <button data-tab="company">🏢 Company</button>
      <button data-tab="services">🧩 Services</button>
      <button data-tab="forms">📝 Forms</button>
      <button id="logoutBtn">🚪 Logout</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Admin Center V3</h1>
      <div id="loginStatus" class="user"></div>
    </div>

    <section id="dashboardPage">
      <div class="grid">
        <div class="stat"><h3>Firebase</h3><b>Connected</b></div>
        <div class="stat"><h3>Website</h3><b>V2</b></div>
        <div class="stat"><h3>Status</h3><b>Active</b></div>
      </div>

      <div class="card">
        <h2>儀表板</h2>
        <p>Firebase 已連線，後台 V3 已啟用。</p>
      </div>
    </section>

    <section id="companyPage" class="card" style="display:none;">
      <h2>公司資料</h2>
      <div class="form-grid">
        <input id="companyName" placeholder="公司名稱">
        <input id="phone" placeholder="電話">
        <input id="emailContact" placeholder="Email">
        <input id="lineID" placeholder="LINE ID">
        <input id="website" placeholder="網站">
        <input id="address" placeholder="地址">
        <textarea id="description" class="full" rows="5" placeholder="公司簡介"></textarea>
      </div>
      <button id="saveCompanyBtn" class="primary">儲存公司資料</button>
    </section>

    <section id="servicesPage" class="card" style="display:none;">
      <h2>服務管理</h2>
      <button id="loadServicesBtn" class="primary">讀取服務</button>
      <div id="servicesList"></div>
    </section>

    <section id="formsPage" class="card" style="display:none;">
      <h2>表單設定</h2>
      <p>欄位：聯絡人、電話、店名、營業地區、LINE名稱、需求、聯繫時間、備註。</p>
    </section>

    <pre id="resultBox"></pre>
  </main>
</div>

<script type="module" src="./assets/js/admin.js"></script>
</body>
</html>
